function homeView() {
  const hero = coverImageUrl
    ? `<div class="hero" onclick="goHome()"><img src="${coverImageUrl}" alt="Forsidebilde"></div>`
    : `<div class="hero-placeholder" onclick="goHome()">🍞</div>`;

  const catGrid = allCategories().map(c => {
    const count = recipes.filter(r=>r.category===c.id).length;
    return `<button class="cat-btn ${activeCategory===c.id?'active':''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-name">${c.name}</span>
      <span class="cat-count">${count} oppskrift${count!==1?'er':''}</span>
    </button>`;
  }).join('');

  const filtered = activeCategory ? recipes.filter(r=>r.category===activeCategory) : [];
  const catLabel = activeCategory ? getCatName(activeCategory) : '';

  const recipeList = activeCategory ? `
    <button class="btn" style="margin-bottom:12px" onclick="selectCat(null)">← Alle kategorier</button>
    <h2 style="margin-bottom:12px">${catLabel}</h2>
    ${filtered.length===0?`<div class="info-box">Ingen oppskrifter i denne kategorien ennå.</div>`:''}
    ${filtered.map(r=>{
      const thumb=r.versions.find(v=>v.images&&v.images.length>0)?.images[0]||null;

  return `${hero}

    <div class="gap">
      <button class="btn" onclick="setView('settings')">Innstillinger</button>
      <button class="btn-primary" onclick="startNew()">+ Ny</button>
    </div></div>
    ${loading?`<p class="status">Laster...</p>`:''}
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}
    ${!activeCategory?`<div class="categories">${catGrid}</div>`:recipeList}`;
}

function settingsView() {
  const customList = customCategories.length===0
    ? `<p class="muted" style="margin-bottom:12px">Ingen egne kategorier ennå.</p>`
    : customCategories.map(c=>`
        <div class="cat-row">
          <span style="font-size:14px">${c.icon} ${c.name}</span>

    </div>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Forsidebilde</p>

      <input type="file" id="cover-input" accept="image/*" style="display:none">
      <button class="btn" onclick="document.getElementById('cover-input').click()">Last opp forsidebilde</button>

        <input type="text" id="new-cat-name" placeholder="F.eks. Marmelade">
        <button class="btn-primary" style="white-space:nowrap" onclick="addCustomCat()">+ Legg til</button>
      </div>
    </div>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Opprett ny bruker</p>
      <p class="muted" style="margin-bottom:10px">Legg til en ny person som skal ha tilgang til appen.</p>
      <label>E-postadresse</label>
      <input type="email" id="new-user-email" placeholder="navn@epost.no">

      <p style="font-weight:500;margin-bottom:6px">Claude API-nøkkel</p>
      <p class="muted" style="margin-bottom:8px">Brukes til å lese oppskrifter fra bilder.</p>
      ${anthropicKey?`<p style="font-size:13px;color:#1D9E75;margin-bottom:8px">✅ API-nøkkel er lagret</p>`:`<p style="font-size:13px;color:#c0392b;margin-bottom:8px">❌ Ingen API-nøkkel</p>`}
      <input type="password" id="akey-input" placeholder="sk-ant-...">
      <button class="btn-primary" style="margin-top:10px;width:100%" onclick="saveApiKey()">Lagre nøkkel</button>
    </div>
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}`;
}

function recipeView() {
  const r = recipes.find(x=>x.id===selected);
  if (!r) { view='home'; return homeView(); }
  const v = r.versions[selectedVersion];
  const catName = getCatName(r.category);
  const tabs = r.versions.length>1?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${r.versions.map((ver,i)=>
    `<button class="btn ${i===selectedVersion?'':'.'}" style="font-size:12px;${i===selectedVersion?'background:#f0f0e8':''}" onclick="selVer(${i})">v${r.versions.length-i} · ${fmt(ver.date)}</button>`).join('')}</div>`:'';
  const imgs=(v.images||[]).map(img=>`<img class="recipe-img" src="${img}" alt="">`).join('');
  return `
    <div class="topbar no-print"><button class="btn" onclick="backFromRecipe()">← Tilbake</button>
    <div class="gap">
      <button class="btn" onclick="startEdit()">Rediger</button>
      <button class="btn no-print" onclick="window.print()">🖨 Skriv ut</button>
      <button class="btn-danger" onclick="confirmDelete()">Slett</button>
    </div></div>
    <p class="muted" style="margin-bottom:4px">${catName}</p>
    <h2 style="margin-bottom:12px">${r.name}</h2>
    ${tabs}${imgs}
    ${v.notes?`<div class="info-box">${v.notes}</div>`:''}
    <div class="card"><p style="font-weight:500;margin-bottom:8px">Ingredienser</p><pre>${v.ingredients}</pre></div>

function editView() {
  const v = editData.versions[0];
  const imgs=(v.images||[]).map(img=>`<img class="recipe-img" src="${img}" alt="">`).join('');
  const catOptions=allCategories().map(c=>`<option value="${c.id}" ${editData.category===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('');
  return `
    <div class="topbar"><button class="btn" onclick="setView('home')">← Avbryt</button></div>
    <h2>${editData.name||'Ny oppskrift'}</h2>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Scan oppskrift fra bilde</p>
      <p class="muted" style="margin-bottom:10px">Ta bilde av en oppskrift – Claude leser den og fyller inn feltene automatisk.</p>
      <input type="file" id="scan-cam" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="scan-input" accept="image/*" style="display:none">
      <div class="gap">
        <button class="btn" style="flex:1" onclick="document.getElementById('scan-cam').click()">📷 Ta bilde</button>

      </div>
    </div>
    <div class="card">
      <label>Navn</label><input id="e-name" value="${editData.name}" placeholder="F.eks. Surdeigsbaguetter">

      <select id="e-cat"><option value="">Velg kategori...</option>${catOptions}</select>
    </div>
    <div class="card">
      <p class="muted" style="margin-bottom:8px">Versjon – ${fmt(v.date)}</p>
      <label>Ingredienser</label><textarea id="e-ing" rows="5">${v.ingredients}</textarea>
      <label>Fremgangsmåte</label><textarea id="e-steps" rows="6">${v.steps}</textarea>
      <label>Notater / justeringer</label><textarea id="e-notes" rows="3">${v.notes}</textarea>
    </div>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Bilder av resultatet</p>
      ${imgs}
      <input type="file" id="img-input" accept="image/*" style="display:none">
      <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none">
      <div class="gap">
        <button class="btn" style="flex:1" onclick="document.getElementById('cam-input').click()">📷 Ta bilde</button>
        <button class="btn" style="flex:1" onclick="document.getElementById('img-input').click()">🖼 Last opp</button>
      </div>
    </div>
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}
    <button class="btn-primary" style="width:100%;margin-top:4px" onclick="handleSave()" ${loading?'disabled':''}>
      ${loading?'Lagrer...':'Lagre oppskrift'}</button>`;
}

function bindLogin() {
  document.getElementById('root').addEventListener('keydown', e => {
    if (e.key==='Enter' && loginMode==='email') doEmailLogin();
  });
}

function bindEdit() {
  document.getElementById('img-input').addEventListener('change', e=>handleImageFile(e.target.files[0]));
  document.getElementById('cam-input').addEventListener('change', e=>handleImageFile(e.target.files[0]));
  document.getElementById('scan-input').addEventListener('change', e=>scanRecipe(e.target.files[0]));
  document.getElementById('scan-cam').addEventListener('change', e=>scanRecipe(e.target.files[0]));
}

function bindSettings() {
  const ci=document.getElementById('cover-input');
  if(ci) ci.addEventListener('change', async e=>{
    const file=e.target.files[0]; if(!file) return;
    setStatus('Laster opp forsidebilde...');
    const url=await uploadFile(file,'cover/cover.jpg');
    coverImageUrl=url;
    sessionStorage.setItem('bakebok_cover',url);
    setStatus('Forsidebilde lagret!');
    setTimeout(()=>{statusMsg='';render();},2000);
    render();
  });
}

// Auth
async function doGoogleLogin() {
  try { await signInWithPopup(auth, googleProvider); }
  catch(e) { statusMsg='Innlogging feilet. Prøv igjen.'; render(); }
}
async function doEmailLogin() {
  const email=document.getElementById('l-email')?.value.trim();
  const pass=document.getElementById('l-pass')?.value;
  if(!email||!pass){statusMsg='Fyll inn e-post og passord.';render();return;}
  try { await signInWithEmailAndPassword(auth,email,pass); }
  catch(e) { statusMsg='Feil e-post eller passord.'; render(); }
}
async function doSignOut() { await signOut(auth); }

// Firestore
async function loadRecipes() {
  const snap=await getDocs(collection(db,'recipes'));
  recipes=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>new Date(b.versions[0].date)-new Date(a.versions[0].date));
}
async function loadCustomCategories() {
  const snap=await getDocs(collection(db,'categories'));
  customCategories=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadApiKey() {
  const snap=await getDocs(collection(db,'settings'));
  const keyDoc=snap.docs.find(d=>d.id==='apikey');
  if(keyDoc){anthropicKey=keyDoc.data().key;sessionStorage.setItem('bakebok_akey',anthropicKey);}
}
async function saveRecipeToDb(recipe) {
  await setDoc(doc(db,'recipes',recipe.id),recipe);
  await loadRecipes();
}
async function deleteRecipeFromDb(id) {
  await deleteDoc(doc(db,'recipes',id));
  await loadRecipes();
}
async function saveApiKey() {
  const k=document.getElementById('akey-input').value.trim();
  if(!k){setStatus('Lim inn en API-nøkkel først.');return;}
  anthropicKey=k; sessionStorage.setItem('bakebok_akey',k);
  await setDoc(doc(db,'settings','apikey'),{key:k});
  setStatus('API-nøkkel lagret!');
  setTimeout(()=>{statusMsg='';render();},2000);
}
async function addCustomCat() {
  const name=document.getElementById('new-cat-name').value.trim();
  const icon=document.getElementById('new-cat-icon').value.trim()||'🫙';
  if(!name){setStatus('Skriv inn et kategorinavn.');return;}
  const id='custom_'+name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
  const cat={id,name,icon};
  await setDoc(doc(db,'categories',id),cat);
  customCategories.push(cat);
  setStatus('Kategori lagt til!');
  setTimeout(()=>{statusMsg='';render();},1500);
  render();
}
async function deleteCustomCat(id) {
  if(!confirm('Slette denne kategorien?')) return;
  await deleteDoc(doc(db,'categories',id));
  customCategories=customCategories.filter(c=>c.id!==id);
  render();
}

// Storage
async function uploadFile(file, path) {
  const storageRef=ref(storage,path);
  await uploadBytes(storageRef,file);
  return getDownloadURL(storageRef);
}
async function handleImageFile(file) {
  if(!file) return;
  saveFormState();
  setStatus('Laster opp bilde...');
  const url=await uploadFile(file,`images/${Date.now()}_${file.name}`);
  editData.versions[0].images=[...(editData.versions[0].images||[]),url];
  setStatus(''); render();
}

}

  const n=document.getElementById('e-name');

async function handleSave() {

async function confirmDelete() {

// Scan
function toBase64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
}
async function scanRecipe(file) {
  if(!file) return;
  if(!anthropicKey){setStatus('Legg inn Claude API-nøkkel i innstillinger først.');return;}
  saveFormState();setStatus('Leser oppskrift fra bilde...');
  const b64=await toBase64(file);
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
        {type:'text',text:'Dette er et bilde av en oppskrift. Returner KUN gyldig JSON: {"name":"","ingredients":"","steps":"","notes":""}'}
      ]}]})
    });
    const data=await res.json();
    const parsed=JSON.parse(data.content?.[0]?.text.replace(/```json|```/g,'').trim()||'{}');
    if(parsed.name){editData.name=parsed.name;document.getElementById('e-name').value=parsed.name;}
    if(parsed.ingredients){editData.versions[0].ingredients=parsed.ingredients;document.getElementById('e-ing').value=parsed.ingredients;}
    if(parsed.steps){editData.versions[0].steps=parsed.steps;document.getElementById('e-steps').value=parsed.steps;}
    if(parsed.notes){editData.versions[0].notes=parsed.notes;document.getElementById('e-notes').value=parsed.notes;}
    setStatus('Oppskrift lest! Sjekk og juster feltene.');
  } catch(e){setStatus('Kunne ikke lese oppskriften. Prøv igjen.');}
}

// Opprett ny bruker
async function createNewUser() {
  const email = document.getElementById('new-user-email').value.trim();
  const pass = document.getElementById('new-user-pass').value;
  if (!email || !pass) { setStatus('Fyll inn både e-post og passord.'); return; }
  if (pass.length < 6) { setStatus('Passordet må være minst 6 tegn.'); return; }
  setStatus('Oppretter bruker...');
  try {
    const createUser = httpsCallable(functions, 'createUser');
    const result = await createUser({ email, password: pass });
    setStatus(`Bruker opprettet: ${result.data.email}`);
    setTimeout(() => { statusMsg = ''; render(); }, 3000);
  } catch (err) {
    setStatus('Feil: ' + (err.message || 'Kunne ikke opprette bruker.'));
  }
}
