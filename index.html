<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakebok</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bakebok">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 600px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 600; }
  h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0 1.5rem; }
  .card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; border: 0.5px solid #e0e0d8; }
  .card-clickable { cursor: pointer; transition: box-shadow 0.15s; }
  .card-clickable:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn { border: 0.5px solid #ccc; border-radius: 8px; padding: 8px 16px; background: transparent; color: #1a1a1a; cursor: pointer; font-size: 14px; }
  .btn:hover { background: #f0f0e8; }
  .btn-primary { border: none; border-radius: 8px; padding: 10px 20px; background: #1D9E75; color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-primary:hover { background: #178a63; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-danger { border: 0.5px solid #c0392b; border-radius: 8px; padding: 8px 16px; background: transparent; color: #c0392b; cursor: pointer; font-size: 14px; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  input, textarea, select { width: 100%; border-radius: 8px; border: 0.5px solid #ccc; padding: 8px 12px; font-size: 14px; font-family: inherit; background: #fff; color: #1a1a1a; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #1D9E75; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  .status { font-size: 13px; color: #666; margin: 8px 0; }
  .muted { font-size: 12px; color: #888; }
  .gap { display: flex; gap: 8px; flex-wrap: wrap; }
  .version-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .version-tab { font-size: 12px; }
  .version-tab.active { background: #f0f0e8; }
  pre { white-space: pre-wrap; font-family: inherit; font-size: 14px; line-height: 1.7; }
  img.recipe-img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
  .info-box { background: #f0f0e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; font-size: 13px; color: #555; }
  code { font-size: 12px; background: #fff; padding: 4px 8px; border-radius: 4px; display: block; word-break: break-all; margin-top: 6px; }
  .hero { width: 100%; height: 180px; border-radius: 16px; overflow: hidden; margin-bottom: 1.25rem; cursor: pointer; }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .hero-placeholder { width: 100%; height: 180px; border-radius: 16px; background: linear-gradient(135deg, #e8e4d8, #d4c9a8); margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: center; font-size: 48px; cursor: pointer; }
  .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .cat-btn { border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 14px 12px; background: #fff; cursor: pointer; text-align: left; transition: all 0.15s; width: 100%; }
  .cat-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #1D9E75; }
  .cat-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .cat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .cat-name { font-size: 13px; font-weight: 500; line-height: 1.3; display: block; }
  .cat-count { font-size: 11px; opacity: 0.6; margin-top: 2px; display: block; }
  .cat-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid #f0f0e8; }
  .cat-row:last-child { border-bottom: none; }
  .cat-row-icon { font-size: 20px; width: 28px; text-align: center; }
  .cat-row-name { flex: 1; font-size: 14px; }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 8px; max-height: 160px; overflow-y: auto; }
  .emoji-opt { font-size: 20px; padding: 4px; border-radius: 6px; cursor: pointer; text-align: center; border: 0.5px solid transparent; }
  .emoji-opt:hover, .emoji-opt.selected { border-color: #1D9E75; background: #e8f5f0; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CLIENT_ID = '640046806972-7c9i1u5vemrok1timpeejhef1jnpdjiv.apps.googleusercontent.com';
const FOLDER_NAME = 'Bakebok';
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPE = 'https://www.googleapis.com/auth/drive.file';

const DEFAULT_CATEGORIES = [
  { id: 'gjærbrød',  name: 'Brød på gjær',    icon: '🍞' },
  { id: 'surdeig',   name: 'Brød på surdeig',  icon: '🫓' },
  { id: 'søtbakst',  name: 'Søtbakst på gjær', icon: '🥐' },
  { id: 'kjeks',     name: 'Kjeks og scones',   icon: '🍪' },
  { id: 'kaker',     name: 'Kaker',             icon: '🎂' },
  { id: 'andre',     name: 'Andre bakverk',     icon: '🧁' },
];

const EMOJI_OPTS = ['🍞','🫓','🥐','🥖','🧇','🥞','🧆','🥨','🍩','🍪','🎂','🧁','🍰','🍫','🍬','🍭','🍯','🍓','🍋','🍊','🫐','🍇','🥝','🥜','🌾','🧂','🫙','🍶','☕','🫖'];

const CAT_ALIAS = {
  'brød på gjær':'gjærbrød','gjærbrød':'gjærbrød',
  'brød på surdeig':'surdeig','surdeig':'surdeig',
  'søtbakst på gjær':'søtbakst','søtbakst':'søtbakst',
  'kjeks og scones':'kjeks','kjeks':'kjeks','scones':'kjeks',
  'kaker':'kaker','andre bakverk':'andre','andre':'andre',
};

function normCat(c) {
  if (!c) return '';
  const lower = c.toLowerCase();
  if (CAT_ALIAS[lower]) return CAT_ALIAS[lower];
  const found = categories.find(cat => cat.id === c || cat.name.toLowerCase() === lower);
  return found ? found.id : c;
}
function fmt(iso) { return new Date(iso).toLocaleDateString('nb-NO',{day:'2-digit',month:'short',year:'numeric'}); }
function genId() { return 'cat_' + Date.now(); }

let token        = sessionStorage.getItem('bakebok_token') || null;
let anthropicKey = sessionStorage.getItem('bakebok_akey')  || null;
let coverImageUrl= sessionStorage.getItem('bakebok_cover') || null;
let folderId     = null;
let coverFileId  = null;
let categoriesFileId = null;
let recipes      = [];
let categories   = [...DEFAULT_CATEGORIES];
let view         = 'home';
let selected     = null;
let selectedVersion = 0;
let editData     = null;
let loading      = false;
let statusMsg    = '';
let activeCategory = null;
let newCatIcon   = '🧁';

function render() {
  const app = document.getElementById('app');
  if      (view === 'settings') { app.innerHTML = settingsView(); bindSettings(); }
  else if (view === 'edit')     { app.innerHTML = editView();     bindEdit(); }
  else if (view === 'recipe')   { app.innerHTML = recipeView(); }
  else                          { app.innerHTML = homeView(); }
}

/* ---- VIEWS ---- */
function homeView() {
  const hero = coverImageUrl
    ? `<div class="hero" onclick="goHome()"><img src="${coverImageUrl}" alt="Forsidebilde"></div>`
    : `<div class="hero-placeholder" onclick="goHome()">🍞</div>`;

  if (!token) return `${hero}
    <div class="topbar" style="padding-top:0"><h1>Bakebok</h1>
    <button class="btn" onclick="setView('settings')">Innstillinger</button></div>
    <div class="card"><p style="margin-bottom:12px">Logg inn med Google for å synkronisere oppskriftene dine.</p>
    <button class="btn-primary" onclick="signIn()">Logg inn med Google</button></div>
    ${statusMsg ? `<p class="status">${statusMsg}</p>` : ''}`;

  const catGrid = categories.map(c => {
    const count = recipes.filter(r => normCat(r.category) === c.id).length;
    return `<button class="cat-btn ${activeCategory===c.id?'active':''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-name">${c.name}</span>
      <span class="cat-count">${count} oppskrift${count!==1?'er':''}</span>
    </button>`;
  }).join('');

  const filtered = activeCategory ? recipes.filter(r => normCat(r.category) === activeCategory) : [];
  const catLabel = activeCategory ? categories.find(c=>c.id===activeCategory)?.name : '';

  const recipeList = activeCategory ? `
    <button class="btn" style="margin-bottom:12px" onclick="selectCat(null)">← Alle kategorier</button>
    <h2 style="margin-bottom:12px">${catLabel}</h2>
    ${filtered.length===0 ? `<div class="info-box">Ingen oppskrifter i denne kategorien ennå.</div>` : ''}
    ${filtered.map(r => {
      const thumb = r.versions.find(v=>v.images&&v.images.length>0)?.images[0]||null;
      return `<div class="card card-clickable" onclick="openRecipe('${r.id}')" style="display:flex;align-items:center;gap:12px">
        <div style="flex:1;min-width:0">
          <p style="font-weight:500">${r.name}</p>
          <p class="muted">Sist oppdatert ${fmt(r.versions[0].date)}</p>
        </div>
        ${thumb?`<img src="${thumb}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0">`:''}
      </div>`;
    }).join('')}` : '';

  return `${hero}
    <div class="topbar" style="padding-top:0"><h1>Bakebok</h1>
    <div class="gap">
      <button class="btn" onclick="setView('settings')">Innstillinger</button>
      <button class="btn-primary" onclick="startNew()">+ Ny</button>
    </div></div>
    ${loading?`<p class="status">Laster...</p>`:''}
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}
    ${!activeCategory?`<div class="categories">${catGrid}</div>`:recipeList}`;
}

function settingsView() {
  const catList = categories.map(c => `
    <div class="cat-row">
      <span class="cat-row-icon">${c.icon}</span>
      <span class="cat-row-name">${c.name}</span>
      <button class="btn btn-sm btn-danger" onclick="deleteCategory('${c.id}')">Slett</button>
    </div>`).join('');

  const emojiGrid = EMOJI_OPTS.map(e =>
    `<div class="emoji-opt ${e===newCatIcon?'selected':''}" onclick="pickEmoji('${e}')">${e}</div>`).join('');

  return `
    <div class="topbar"><button class="btn" onclick="setView('home')">← Tilbake</button></div>
    <h2>Innstillinger</h2>
    <div class="card">
      <p style="font-size:13px;margin-bottom:8px">Status: ${token?'✅ Google Drive tilkoblet':'❌ Ikke innlogget'}</p>
      ${token?`<button class="btn" onclick="signOut()">Logg ut</button>`:`<button class="btn-primary" onclick="signIn()">Logg inn med Google</button>`}
    </div>
    ${token?`<div class="card">
      <p style="font-weight:500;margin-bottom:8px">Forsidebilde</p>
      ${coverImageUrl?`<img src="${coverImageUrl}" style="width:100%;border-radius:8px;margin-bottom:12px;max-height:150px;object-fit:cover">`:`<p class="muted" style="margin-bottom:12px">Ingen bilde valgt ennå.</p>`}
      <input type="file" id="cover-input" accept="image/*" style="display:none">
      <button class="btn" onclick="document.getElementById('cover-input').click()">Last opp forsidebilde</button>
    </div>`:''}
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Kategorier</p>
      ${catList}
      <div style="border-top:0.5px solid #e0e0d8;margin-top:12px;padding-top:12px">
        <p style="font-size:13px;font-weight:500;margin-bottom:8px">Legg til ny kategori</p>
        <div class="gap" style="margin-bottom:8px">
          <span style="font-size:24px;min-width:36px;text-align:center" id="chosen-icon">${newCatIcon}</span>
          <input id="new-cat-name" placeholder="Navn på kategori" style="flex:1">
        </div>
        <div class="emoji-grid">${emojiGrid}</div>
        <button class="btn-primary" style="width:100%;margin-top:10px" onclick="addCategory()">+ Legg til kategori</button>
      </div>
    </div>
    <div class="card">
      <p style="font-weight:500;margin-bottom:6px">Claude API-nøkkel</p>
      <p class="muted" style="margin-bottom:8px">Brukes til å lese oppskrifter fra bilder.</p>
      <input type="password" id="akey-input" value="${anthropicKey||''}" placeholder="sk-ant-...">
      <button class="btn-primary" style="margin-top:10px;width:100%" onclick="saveApiKey()">Lagre nøkkel</button>
    </div>
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}
    <div class="info-box">Redirect URI:<code>${REDIRECT_URI}</code></div>`;
}

function recipeView() {
  const r = recipes.find(x=>x.id===selected);
  if (!r) { view='home'; return homeView(); }
  const v = r.versions[selectedVersion];
  const catName = categories.find(c=>c.id===normCat(r.category))?.name || r.category;
  const tabs = r.versions.length>1?`<div class="version-tabs">${r.versions.map((ver,i)=>
    `<button class="btn version-tab ${i===selectedVersion?'active':''}" onclick="selVer(${i})">v${r.versions.length-i} · ${fmt(ver.date)}</button>`).join('')}</div>`:'';
  const imgs = (v.images||[]).map(img=>`<img class="recipe-img" src="${img}" alt="">`).join('');
  return `
    <div class="topbar"><button class="btn" onclick="backFromRecipe()">← Tilbake</button>
    <div class="gap">
      <button class="btn" onclick="addVersion()">+ Versjon</button>
      <button class="btn" onclick="startEdit()">Rediger</button>
      <button class="btn-danger" onclick="confirmDelete()">Slett</button>
    </div></div>
    <p class="muted" style="margin-bottom:4px">${catName}</p>
    <h2 style="margin-bottom:12px">${r.name}</h2>
    ${tabs}${imgs}
    ${v.notes?`<div class="info-box">${v.notes}</div>`:''}
    <div class="card"><p style="font-weight:500;margin-bottom:8px">Ingredienser</p><pre>${v.ingredients}</pre></div>
    <div class="card"><p style="font-weight:500;margin-bottom:8px">Fremgangsmåte</p><pre>${v.steps}</pre></div>`;
}

function editView() {
  const v = editData.versions[0];
  const imgs = (v.images||[]).map(img=>`<img class="recipe-img" src="${img}" alt="">`).join('');
  const currentCat = normCat(editData.category);
  const catOptions = categories.map(c=>`<option value="${c.id}" ${currentCat===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('');
  return `
    <div class="topbar"><button class="btn" onclick="setView('home')">← Avbryt</button></div>
    <h2>${editData.name||'Ny oppskrift'}</h2>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Scan oppskrift fra bilde</p>
      <p class="muted" style="margin-bottom:10px">Ta bilde av en oppskrift – Claude leser den og fyller inn feltene automatisk.</p>
      <input type="file" id="scan-cam" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="scan-input" accept="image/*" style="display:none">
      <div class="gap">
        <button class="btn" style="flex:1" onclick="document.getElementById('scan-cam').click()">📷 Ta bilde</button>
        <button class="btn" style="flex:1" onclick="document.getElementById('scan-input').click()">🖼 Last opp</button>
      </div>
    </div>
    <div class="card">
      <label>Navn</label><input id="e-name" value="${editData.name}" placeholder="F.eks. Surdeigsbaguetter">
      <label>Kategori</label>
      <select id="e-cat"><option value="">Velg kategori...</option>${catOptions}</select>
    </div>
    <div class="card">
      <p class="muted" style="margin-bottom:8px">Versjon – ${fmt(v.date)}</p>
      <label>Ingredienser</label><textarea id="e-ing" rows="5">${v.ingredients}</textarea>
      <label>Fremgangsmåte</label><textarea id="e-steps" rows="6">${v.steps}</textarea>
      <label>Notater / justeringer</label><textarea id="e-notes" rows="3">${v.notes}</textarea>
    </div>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Bilder av resultatet</p>
      ${imgs}
      <input type="file" id="img-input" accept="image/*" style="display:none">
      <input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none">
      <div class="gap">
        <button class="btn" style="flex:1" onclick="document.getElementById('cam-input').click()">📷 Ta bilde</button>
        <button class="btn" style="flex:1" onclick="document.getElementById('img-input').click()">🖼 Last opp</button>
      </div>
    </div>
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}
    <button class="btn-primary" style="width:100%;margin-top:4px" onclick="handleSave()" ${loading?'disabled':''}>
      ${loading?'Lagrer...':'Lagre oppskrift'}</button>`;
}

/* ---- BIND ---- */
function bindEdit() {
  document.getElementById('img-input').addEventListener('change', e => handleImageFile(e.target.files[0]));
  document.getElementById('cam-input').addEventListener('change', e => handleImageFile(e.target.files[0]));
  document.getElementById('scan-input').addEventListener('change', e => scanRecipe(e.target.files[0]));
  document.getElementById('scan-cam').addEventListener('change', e => scanRecipe(e.target.files[0]));
}

function bindSettings() {
  const ci = document.getElementById('cover-input');
  if (ci) ci.addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    setStatus('Laster opp forsidebilde...');
    await uploadCoverImage(file);
    sessionStorage.setItem('bakebok_cover', coverImageUrl);
    setStatus('Forsidebilde lagret!');
    setTimeout(()=>{ statusMsg=''; render(); }, 2000);
    render();
  });
}

/* ---- CATEGORY ACTIONS ---- */
function pickEmoji(e) { newCatIcon=e; render(); }

async function addCategory() {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) { setStatus('Skriv inn et kategorinavn.'); return; }
  const id = genId();
  categories.push({ id, name, icon: newCatIcon });
  await saveCategories();
  newCatIcon = '🧁';
  setStatus('Kategori lagt til!');
  setTimeout(()=>{ statusMsg=''; render(); }, 1500);
  render();
}

async function deleteCategory(id) {
  const cat = categories.find(c=>c.id===id);
  if (!cat) return;
  const count = recipes.filter(r=>normCat(r.category)===id).length;
  const msg = count > 0
    ? `Vil du slette kategorien "${cat.name}"? Den har ${count} oppskrift${count!==1?'er':''} – disse mister kategoritilhørighet.`
    : `Vil du slette kategorien "${cat.name}"?`;
  if (!confirm(msg)) return;
  categories = categories.filter(c=>c.id!==id);
  await saveCategories();
  render();
}

/* ---- ACTIONS ---- */
function setView(v) { view=v; statusMsg=''; render(); }
function goHome() { activeCategory=null; view='home'; render(); }
function openRecipe(id) { selected=id; selectedVersion=0; view='recipe'; render(); }
function selVer(i) { selectedVersion=i; render(); }
function setStatus(s) { statusMsg=s; render(); }
function selectCat(id) { activeCategory=id; render(); }
function backFromRecipe() { view='home'; render(); }

function signIn() {
  const p = new URLSearchParams({client_id:CLIENT_ID,redirect_uri:REDIRECT_URI,response_type:'token',scope:SCOPE,prompt:'consent'});
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${p}`;
}
function signOut() {
  token=null; recipes=[]; folderId=null;
  sessionStorage.removeItem('bakebok_token');
  render();
}

async function saveApiKey() {
  const k=document.getElementById('akey-input').value.trim();
  if(!k){setStatus('Lim inn en API-nøkkel først.');return;}
  anthropicKey=k;
  sessionStorage.setItem('bakebok_akey',k);
  const list=await driveReq(`https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and name='apikey.txt' and trashed=false&fields=files(id)`);
  const fileId=list.files?.[0]?.id;
  const blob=new Blob([k],{type:'text/plain'});
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(fileId?{}:{name:'apikey.txt',parents:[folderId]})],{type:'application/json'}));
  form.append('file',blob);
  await fetch(fileId
    ?`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {method:fileId?'PATCH':'POST',headers:{Authorization:`Bearer ${token}`},body:form});
  setStatus('API-nøkkel lagret!');
  setTimeout(()=>{statusMsg='';render();},2000);
}

function saveFormState() {
  const n=document.getElementById('e-name');
  const c=document.getElementById('e-cat');
  const i=document.getElementById('e-ing');
  const s=document.getElementById('e-steps');
  const nt=document.getElementById('e-notes');
  if(n) editData.name=n.value;
  if(c) editData.category=c.value;
  if(i) editData.versions[0].ingredients=i.value;
  if(s) editData.versions[0].steps=s.value;
  if(nt) editData.versions[0].notes=nt.value;
}

function startNew() {
  editData={id:`recipe_${Date.now()}`,name:'',category:'',versions:[{date:new
