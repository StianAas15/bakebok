<script type="module">

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const functions = getFunctions(app, 'europe-west1');
const googleProvider = new GoogleAuthProvider();

const DEFAULT_CATEGORIES = [
  { id: 'gjærbrød',  name: 'Brød på gjær',    icon: '' },
  { id: 'surdeig',   name: 'Brød på surdeig',  icon: '' },
  { id: 'søtbakst',  name: 'Søtbakst på gjær', icon: '' },
  { id: 'kjeks',     name: 'Kjeks og scones',   icon: '' },
  { id: 'kaker',     name: 'Kaker',             icon: '' },
  { id: 'andre',     name: 'Andre bakverk',     icon: '' },
];

const BAKE_PCT_CATEGORIES = ['gjærbrød', 'surdeig', 'søtbakst'];

const ROLE_OPTIONS = [
  { id: '',             label: '— ingen —' },
  { id: 'mel_siktet',   label: 'Mel siktet' },
  { id: 'mel_sammalt',  label: 'Mel sammalt' },
  { id: 'væske',        label: 'Væske' },
  { id: 'egg',          label: 'Egg' },
  { id: 'salt',         label: 'Salt' },
  { id: 'søtning',      label: 'Søtning' },
  { id: 'fett',         label: 'Fett' },
  { id: 'gjær',         label: 'Gjær' },
  { id: 'forfermenter', label: 'Forfermenter' },
  { id: 'frø',          label: 'Frø' },
  { id: 'nøtter',       label: 'Nøtter' },
  { id: 'krydder',      label: 'Krydder' },
  { id: 'annet',        label: 'Annet' },
];

const VOLUME_TO_ML = {
  'l': 1000, 'liter': 1000, 'dl': 100, 'cl': 10, 'ml': 1,
  'ss': 15, 'spiseskje': 15, 'spiseskjeer': 15,
  'ts': 5, 'teskje': 5, 'teskjeer': 5,
  'knivsodd': 1, 'kopp': 240, 'cup': 240,
};

const WEIGHT_TO_G = {
  'g': 1, 'gr': 1, 'gram': 1, 'kg': 1000, 'kilo': 1000,
};

// Pakkeenheter for råvarepriser
const PRICE_UNITS = ['kg', 'g', 'l', 'dl', 'ml', 'stk', 'pakke'];

function allCategories() { return [...DEFAULT_CATEGORIES, ...customCategories]; }
function getCatName(id) { return allCategories().find(c=>c.id===id)?.name || id; }
function fmt(iso) { return new Date(iso).toLocaleDateString('nb-NO',{day:'2-digit',month:'short',year:'numeric'}); }

function lookupRole(navn) {
  if (!navn) return '';
  const key = navn.trim().toLowerCase();
  if (ingredientRoles[key]) return ingredientRoles[key].rolle;
  for (const [name, data] of Object.entries(ingredientRoles)) {
    if (key.includes(name) || name.includes(key)) return data.rolle;
  }
  return '';
}

function lookupTetthet(navn) {
  if (!navn) return null;
  const key = navn.trim().toLowerCase();
  if (ingredientRoles[key]) return ingredientRoles[key].tetthet;
  for (const [name, data] of Object.entries(ingredientRoles)) {
    if (key.includes(name) || name.includes(key)) return data.tetthet;
  }
  return null;
}

function asNumber(x) {
  if (x === null || x === undefined || x === '') return 0;
  if (typeof x === 'number') return x;
  const n = parseFloat(String(x).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}
function hasNumberValue(x) {
  if (x === null || x === undefined) return false;
  if (typeof x === 'number') return !isNaN(x);
  return String(x).trim() !== '' && !isNaN(parseFloat(String(x).replace(',', '.')));
}
 
function tilGram(ing) {
  const mengde = asNumber(ing.mengde);
  if (mengde === 0) return null;
  const enhet = (ing.enhet || '').trim().toLowerCase();
  if (WEIGHT_TO_G[enhet] !== undefined) return mengde * WEIGHT_TO_G[enhet];
  if (VOLUME_TO_ML[enhet] !== undefined) {
    const tetthet = lookupTetthet(ing.navn);
    if (tetthet === null || tetthet === undefined) return null;
    return mengde * VOLUME_TO_ML[enhet] * tetthet;
  }
  if (!enhet) return mengde;
  return null;
}

function formatIngredient(ing) {
  const parts = [];
  if (ing.mengde !== null && ing.mengde !== undefined && ing.mengde !== '') parts.push(ing.mengde);
  if (ing.enhet) parts.push(ing.enhet);
  if (ing.navn) parts.push(ing.navn);
  return parts.join(' ');
}

function formatIngredientWithConv(ing) {
  const main = formatIngredient(ing);
  const enhet = (ing.enhet || '').trim().toLowerCase();
  if (VOLUME_TO_ML[enhet] !== undefined) {
    const gram = tilGram(ing);
    if (gram !== null && gram > 0) {
      return `${main} <span class="ing-conv">(≈ ${Math.round(gram)} g)</span>`;
    }
  }
  return main;
}

function calcBakePcts(ingList) {
  if (!Array.isArray(ingList)) return null;
  let melSiktet = 0, melSammalt = 0, vaeskeTotal = 0, salt = 0, deigvekt = 0;

  for (const ing of ingList) {
    const gram = tilGram(ing);
    if (gram === null || gram === 0) continue;
    deigvekt += gram;
    switch (ing.rolle) {
      case 'mel_siktet':   melSiktet += gram; break;
      case 'mel_sammalt':  melSammalt += gram; break;
      case 'væske':        vaeskeTotal += gram; break;
      case 'salt':         salt += gram; break;
      case 'forfermenter':
        melSiktet += gram / 2;
        vaeskeTotal += gram / 2;
        break;
    }
  }

  const melTotal = melSiktet + melSammalt;
  if (melTotal === 0) return { deigvekt };

  return {
    melTotal, melSiktet, melSammalt, vaeskeTotal, salt, deigvekt,
    hydrering: (vaeskeTotal / melTotal) * 100,
    saltPct: (salt / melTotal) * 100,
    grovhet: (melSammalt / melTotal) * 100,
  };
}

function ingredientPct(ing, melTotal) {
  if (melTotal === 0) return null;
  const gram = tilGram(ing);
  if (gram === null || gram === 0) return null;
  return (gram / melTotal) * 100;
}

function shouldShowBakePct(categoryId) {
  return BAKE_PCT_CATEGORIES.includes(categoryId);
}

function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return Math.round(n) + '%';
}
function fmtPct1(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return n.toFixed(1) + '%';
}

function bakePctSummaryHtml(pcts, showBakePct) {
  if (!pcts) return '';
  const deigvektStr = pcts.deigvekt > 0 ? `<span class="pct-label">Deigvekt </span><span class="pct-val">${Math.round(pcts.deigvekt)} g</span>` : '';
  if (!showBakePct || !pcts.hydrering) {
    return deigvektStr ? `<div class="bakepct-summary">${deigvektStr}</div>` : '';
  }
  return `<div class="bakepct-summary">
    <span class="pct-label">Hydrering </span><span class="pct-val">${fmtPct(pcts.hydrering)}</span>
    <span class="pct-label">Salt </span><span class="pct-val">${fmtPct1(pcts.saltPct)}</span>
    <span class="pct-label">Grovhet </span><span class="pct-val">${fmtPct(pcts.grovhet)}</span>
    ${deigvektStr}
  </div>`;
}

// =====================================================================
// RÅVAREKOSTNAD
// =====================================================================

// Konverter prisens enhet til kr per gram (eller per stk for stk-prisede)
function pricePerGram(prisData) {
  if (!prisData) return null;
  const pris = asNumber(prisData.pris);
  const pakkemengde = asNumber(prisData.pakkemengde);
  const enhet = (prisData.enhet || '').trim().toLowerCase();
  if (pakkemengde === 0) return null;

  // Vekt
  if (WEIGHT_TO_G[enhet] !== undefined) {
    const totalGram = pakkemengde * WEIGHT_TO_G[enhet];
    return { krPerGram: pris / totalGram, type: 'vekt' };
  }
  // Volum (krever tetthet for å regne om til gram)
  if (VOLUME_TO_ML[enhet] !== undefined) {
    const totalMl = pakkemengde * VOLUME_TO_ML[enhet];
    return { krPerMl: pris / totalMl, type: 'volum' };
  }
  // Stk eller pakke
  if (enhet === 'stk' || enhet === 'pakke') {
    return { krPerStk: pris / pakkemengde, type: 'stk' };
  }
  return null;
}

// Hva koster denne ingrediensen i denne mengden?
function ingredientCost(ing, prisData) {
  if (!prisData) return null;
  const ppg = pricePerGram(prisData);
  if (!ppg) return null;

  const mengde = asNumber(ing.mengde);
  if (mengde === 0) return null;
  const enhet = (ing.enhet || '').trim().toLowerCase();

  // Hvis prisen er per stk, og mengden er i stk
  if (ppg.type === 'stk') {
    if (enhet === 'stk' || enhet === 'pakke' || !enhet) {
      return mengde * ppg.krPerStk;
    }
    return null;
  }

  // Hvis prisen er per vekt
  if (ppg.type === 'vekt') {
    const gram = tilGram(ing);
    if (gram === null) return null;
    return gram * ppg.krPerGram;
  }

  // Hvis prisen er per volum
  if (ppg.type === 'volum') {
    if (VOLUME_TO_ML[enhet] !== undefined) {
      const ml = mengde * VOLUME_TO_ML[enhet];
      return ml * ppg.krPerMl;
    }
    // Hvis ingrediensen er i vekt og prisen i volum, krever vi tetthet
    if (WEIGHT_TO_G[enhet] !== undefined) {
      const tetthet = lookupTetthet(ing.navn);
      if (!tetthet) return null;
      const gram = mengde * WEIGHT_TO_G[enhet];
      const ml = gram / tetthet;
      return ml * ppg.krPerMl;
    }
    return null;
  }

  return null;
}

function calcRecipeCost(ingList) {
  if (!Array.isArray(ingList)) return null;
  let totalCost = 0;
  let knownCount = 0;
  let unknownCount = 0;
  const unknownNames = [];

  for (const ing of ingList) {
    if (!ing.navn || asNumber(ing.mengde) === 0) continue;
    const navnKey = ing.navn.trim().toLowerCase();
    const prisData = bakeryPrices[navnKey];
    if (prisData) {
      const cost = ingredientCost(ing, prisData);
      if (cost !== null) {
        totalCost += cost;
        knownCount++;
      } else {
        unknownCount++;
        unknownNames.push(ing.navn);
      }
    } else {
      unknownCount++;
      unknownNames.push(ing.navn);
    }
  }

  if (knownCount === 0) return null;
  return { totalCost, knownCount, unknownCount, unknownNames };
}

function fmtKr(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return n.toFixed(2).replace('.', ',') + ' kr';
}

      <button type="button" class="role-remove" onclick="deleteIngredientRole('${navn}')" title="Slett">×</button>

  return `

function recipeView() {
  const r = recipes.find(x=>x.id===selected);
  if (!r) { view='home'; return homeView(); }
  const v = r.versions[selectedVersion];
  const catName = getCatName(r.category);
  const tabs = r.versions.length>1?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${r.versions.map((ver,i)=>
    `<button class="btn" style="font-size:12px;${i===selectedVersion?'background:#f0f0e8':''}" onclick="selVer(${i})">v${r.versions.length-i} · ${fmt(ver.date)}</button>`).join('')}</div>`:'';
  const imgs=(v.images||[]).map(img=>`<img class="recipe-img" src="${img}" alt="">`).join('');

  const ingList = (v.ingredientsList || []);
  const showPct = shouldShowBakePct(r.category);
  const pcts = calcBakePcts(ingList);
  const melTotal = pcts && pcts.melTotal ? pcts.melTotal : 0;

  const ingHtml = ingList.length === 0
    ? `<p class="muted">Ingen ingredienser registrert.</p>`
    : ingList.map(ing => {
        const main = formatIngredientWithConv(ing);
        const merknad = ing.merknad ? `<span class="ing-merknad-text">(${ing.merknad})</span>` : '';
        let pctStr = '';
        if (showPct && melTotal > 0) {
          const p = ingredientPct(ing, melTotal);
          if (p !== null) pctStr = `<span class="ing-pct-text">${Math.round(p)}%</span>`;
        }
        return `<div class="ing-list-item"><span>${main}${merknad}</span>${pctStr}</div>`;
      }).join('');

  // Råvarekostnad – vises kun hvis vi er inne i et bakeri
  let costHtml = '';
  if (activeBakery) {
    const cost = calcRecipeCost(ingList);
    if (cost) {
      const perKg = pcts && pcts.deigvekt > 0 ? (cost.totalCost / pcts.deigvekt * 1000) : null;
      costHtml = `
        <div class="cost-summary">
          <div class="cost-main">Råvarekostnad: ${fmtKr(cost.totalCost)}</div>
          ${perKg ? `<div class="cost-sub">${fmtKr(perKg)} per kg deig</div>` : ''}
          ${cost.unknownCount > 0 ? `<div class="cost-sub" style="color:#856404;margin-top:4px">⚠ Mangler pris på ${cost.unknownCount} ingrediens${cost.unknownCount===1?'':'er'}: ${cost.unknownNames.join(', ')}</div>` : ''}
        </div>`;
    } else if (Object.keys(bakeryPrices).length === 0) {
      costHtml = `<div class="warn-box no-print">💰 Legg inn råvarepriser i bakeriet for å se kostnadsberegning.</div>`;
    } else {
      costHtml = `<div class="warn-box no-print">⚠ Ingen av ingrediensene har registrert pris.</div>`;
    }
  }

  const recipeBakeries = (r.bakeries || []).map(bid => bakeries.find(b => b.id === bid)).filter(Boolean);
  const tagsHtml = recipeBakeries.length > 0
    ? `<div style="margin-bottom:8px">${recipeBakeries.map(b => `<span class="recipe-bakery-tag">🥖 ${b.name}</span>`).join('')}</div>`
    : '';

  const remainingBakeries = bakeries.filter(b => !recipeBakeries.find(rb => rb.id === b.id));
  const bakeryActionsHtml = bakeries.length === 0 ? '' : `
    <div class="card no-print">
      <p style="font-weight:500;margin-bottom:8px">Bakerier</p>
      ${recipeBakeries.length > 0 ? recipeBakeries.map(b => `
        <div class="cat-row">
          <span style="font-size:14px">${b.name}</span>
          <button class="btn" style="padding:4px 10px;font-size:12px" onclick="removeRecipeFromBakery('${r.id}','${b.id}')">Fjern</button>
        </div>
      `).join('') : '<p class="muted" style="margin-bottom:8px">Ikke knyttet til noen bakerier.</p>'}
      ${remainingBakeries.length > 0 ? `
        <div style="display:flex;gap:8px;margin-top:8px">
          <select id="add-to-bakery-select">
            ${remainingBakeries.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}
          </select>
          <button class="btn-primary" style="white-space:nowrap" onclick="addRecipeToSelectedBakery('${r.id}')">+ Tilføy</button>
        </div>
      ` : ''}
    </div>`;

  return `
    <div class="topbar no-print"><button class="btn" onclick="backFromRecipe()">← Tilbake</button>
    <div class="gap">
      <button class="btn" onclick="startEdit()">Rediger</button>
      <button class="btn no-print" onclick="window.print()">🖨 Skriv ut</button>
      <button class="btn-danger" onclick="confirmDelete()">Slett</button>
    </div></div>
    <p class="muted" style="margin-bottom:4px">${catName}</p>
    <h2 style="margin-bottom:8px">${r.name}</h2>
    ${tagsHtml}
    ${tabs}${imgs}
    ${bakePctSummaryHtml(pcts, showPct)}
    ${costHtml}
    ${v.notes?`<div class="info-box">${v.notes}</div>`:''}
    <div class="card"><p style="font-weight:500;margin-bottom:8px">Ingredienser</p>${ingHtml}</div>
    <div class="card"><p style="font-weight:500;margin-bottom:8px">Fremgangsmåte</p><pre>${v.steps || ''}</pre></div>
    ${bakeryActionsHtml}`;
}

function ingredientRowHtml(ing, idx, melTotal, showPct) {
  const roleOpts = ROLE_OPTIONS.map(r => `<option value="${r.id}" ${r.id===(ing.rolle||'')?'selected':''}>${r.label}</option>`).join('');
  let pctStr = '';
  if (showPct && melTotal > 0) {
    const p = ingredientPct(ing, melTotal);
    if (p !== null) pctStr = Math.round(p) + '%';
  }
  return `
    <div class="ing-row" data-idx="${idx}">
      <input type="text" class="ing-mengde" placeholder="Mengde" value="${ing.mengde !== null && ing.mengde !== undefined ? ing.mengde : ''}">
      <input type="text" class="ing-enhet" placeholder="Enhet" value="${ing.enhet || ''}">
      <input type="text" class="ing-navn" placeholder="Ingrediens" value="${ing.navn || ''}" data-idx="${idx}">
      <select class="ing-rolle">${roleOpts}</select>
      <span class="ing-pct">${pctStr}</span>
      <button type="button" class="ing-remove" onclick="removeIngredient(${idx})" title="Fjern">×</button>
    </div>
    <div class="ing-merknad">
      <input type="text" class="ing-merknad-input" placeholder="Merknad (f.eks. romtemperert, etter smak)" value="${ing.merknad || ''}">
    </div>`;
}

function bindLogin() {
  document.getElementById('root').addEventListener('keydown', e => {
    if (e.key==='Enter' && loginMode==='email') doEmailLogin();
  });
}

function bindEdit() {
  document.getElementById('img-input').addEventListener('change', e=>handleImageFile(e.target.files[0]));
  document.getElementById('cam-input').addEventListener('change', e=>handleImageFile(e.target.files[0]));
  document.getElementById('scan-input').addEventListener('change', e=>scanRecipe(e.target.files[0]));
  document.getElementById('scan-cam').addEventListener('change', e=>scanRecipe(e.target.files[0]));

  const container = document.getElementById('ing-container');
  if (container) {
    container.addEventListener('input', (e) => {
      const cls = e.target.classList;
      if (cls && (cls.contains('ing-mengde') || cls.contains('ing-enhet'))) {
        saveFormState();
        clearTimeout(window.recalcTimer);
        window.recalcTimer = setTimeout(() => updateBakePctsInPlace(), 400);
      }
    });

    container.addEventListener('change', (e) => {
      if (e.target.tagName === 'SELECT' && e.target.classList.contains('ing-rolle')) {
        saveFormState();
        render();
      }
    });

    container.addEventListener('blur', (e) => {
      if (e.target.classList && e.target.classList.contains('ing-navn')) {
        const row = e.target.closest('.ing-row');
        if (!row) return;
        const roleSelect = row.querySelector('.ing-rolle');
        if (roleSelect && !roleSelect.value) {
          const role = lookupRole(e.target.value);
          if (role) {
            saveFormState();
            render();
          }
        }
      }
    }, true);
  }

  const catSelect = document.getElementById('e-cat');
  if (catSelect) {
    catSelect.addEventListener('change', () => {
      validationErrors.category = false;
      saveFormState();
      render();
    });
  }

  const nameEl = document.getElementById('e-name');
  if (nameEl) {
    nameEl.addEventListener('input', () => {
      if (validationErrors.name) {
        validationErrors.name = false;
        nameEl.classList.remove('input-error');
      }
    });
  }
}

function updateBakePctsInPlace() {
  if (!editData) return;
  const ingList = editData.versions[0].ingredientsList || [];
  const showPct = shouldShowBakePct(editData.category);
  const pcts = calcBakePcts(ingList);
  const melTotal = pcts && pcts.melTotal ? pcts.melTotal : 0;

  const summary = document.querySelector('.bakepct-summary');
  if (summary) {
    const newSummary = bakePctSummaryHtml(pcts, showPct);
    if (newSummary) {
      summary.outerHTML = newSummary;
    } else {
      summary.remove();
    }
  } else if (pcts && (pcts.deigvekt > 0 || (showPct && pcts.hydrering))) {
    render();
    return;
  }

  const rows = document.querySelectorAll('.ing-row');
  rows.forEach((row, i) => {
    const ing = ingList[i];
    if (!ing) return;
    const pctSpan = row.querySelector('.ing-pct');
    if (!pctSpan) return;
    let pctStr = '';
    if (showPct && melTotal > 0) {
      const p = ingredientPct(ing, melTotal);
      if (p !== null) pctStr = Math.round(p) + '%';
    }
    pctSpan.textContent = pctStr;
  });
}

async function isEmailAllowed(email) {
  if (!email) return false;
  const normalized = email.trim().toLowerCase();
  try {
    const docRef = doc(db, 'allowed_emails', normalized);
    const snap = await getDoc(docRef);
    return snap.exists();
  } catch (e) {
    console.error('Hvitliste-sjekk feilet:', e);
    return false;
  }
}

async function doGoogleLogin() {

  catch(e) { statusMsg='Innlogging feilet. Prøv igjen.'; render(); }

async function doEmailLogin() {

  const pass=document.getElementById('l-pass')?.value;

async function loadRecipes() {
  const snap=await getDocs(collection(db,'recipes'));
  recipes=snap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b)=>new Date(b.versions[0].date)-new Date(a.versions[0].date));
}
async function loadCustomCategories() {
  const snap=await getDocs(collection(db,'categories'));
  customCategories=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadBakeries() {
  const snap = await getDocs(collection(db, 'bakeries'));
  bakeries = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.name.localeCompare(b.name,'nb'));
}
async function loadBakeryPrices(bakeryId) {
  bakeryPrices = {};
  if (!bakeryId) return;
  const snap = await getDocs(collection(db, 'bakeries', bakeryId, 'prices'));
  snap.docs.forEach(d => {
    const data = d.data();
    if (data.navn) {
      bakeryPrices[data.navn.toLowerCase()] = {
        pris: data.pris,
        pakkemengde: data.pakkemengde,
        enhet: data.enhet,
        oppdatert: data.oppdatert,
      };
    }
  });
}
async function loadAppSettings() {
  const snap=await getDocs(collection(db,'settings'));
  snap.docs.forEach(d=>{
    if(d.id==='apikey') anthropicKey=d.data().key;
    if(d.id==='cover') coverImageUrl=d.data().url;
  });
}
async function loadIngredientRoles() {
  const snap = await getDocs(collection(db, 'ingredient_roles'));
  ingredientRoles = {};
  snap.docs.forEach(d => {
    const data = d.data();
    if (data.navn && data.rolle !== undefined) {
      ingredientRoles[data.navn.toLowerCase()] = {
        rolle: data.rolle,
        tetthet: (data.tetthet === undefined) ? null : data.tetthet
      };
    }
  });
}

function bakeryId(name) {
  return 'bakery_' + name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9æøå_]/g, '') + '_' + Date.now();
}

async function addBakery() {
  const name = document.getElementById('new-bakery-name').value.trim();
  if (!name) { setStatus('Skriv inn et navn på bakeriet.'); return; }
  const id = bakeryId(name);
  await setDoc(doc(db, 'bakeries', id), { name, createdAt: new Date().toISOString() });
  await loadBakeries();
  setStatus(`Bakeri "${name}" opprettet.`);
  setTimeout(() => { statusMsg = ''; render(); }, 2000);
  render();
}

async function deleteBakery(id) {
  const b = bakeries.find(x => x.id === id);
  if (!b) return;
  if (!confirm(`Slette "${b.name}"? Oppskrifter mister bare taggen, ikke selve oppskriftene.`)) return;
  await deleteDoc(doc(db, 'bakeries', id));
  const affected = recipes.filter(r => Array.isArray(r.bakeries) && r.bakeries.includes(id));
  for (const r of affected) {
    const updated = { ...r, bakeries: r.bakeries.filter(bid => bid !== id) };
    await setDoc(doc(db, 'recipes', r.id), updated);
  }

function ingredientRoleId(navn) {
  return navn.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9æøå_]/g, '');
}

function parseTetthet(str) {
  if (str === null || str === undefined || str === '') return null;
  const n = parseFloat(String(str).replace(',', '.'));
  return isNaN(n) ? null : n;
}

async function addIngredientRole() {
  const navn = document.getElementById('new-role-navn').value.trim();

  if (!navn) { setStatus('Skriv inn et ingrediensnavn.'); return; }
  const navnLow = navn.toLowerCase();
  const id = ingredientRoleId(navn);
  await setDoc(doc(db, 'ingredient_roles', id), { navn: navnLow, rolle, tetthet });
  ingredientRoles[navnLow] = { rolle, tetthet };
  setStatus(`Lagt til "${navn}".`);

  render();
}

async function saveAllRoleEdits() {
  const rows = document.querySelectorAll('.role-row[data-navn]');
  let endret = 0;
  setStatus('Lagrer endringer...');

  for (const row of rows) {
    const original = row.querySelector('.role-navn').dataset.original;
    const nyttNavn = row.querySelector('.role-navn').value.trim().toLowerCase();
    const nyRolle = row.querySelector('.role-rolle').value;
    const nyTetthet = parseTetthet(row.querySelector('.role-tetthet').value);
    const originalData = ingredientRoles[original] || {};

    if (!nyttNavn) continue;

    if (nyttNavn !== original) {
      await deleteDoc(doc(db, 'ingredient_roles', ingredientRoleId(original)));
      delete ingredientRoles[original];
      await setDoc(doc(db, 'ingredient_roles', ingredientRoleId(nyttNavn)), { navn: nyttNavn, rolle: nyRolle, tetthet: nyTetthet });
      ingredientRoles[nyttNavn] = { rolle: nyRolle, tetthet: nyTetthet };
      endret++;
    } else if (nyRolle !== originalData.rolle || nyTetthet !== originalData.tetthet) {
      await setDoc(doc(db, 'ingredient_roles', ingredientRoleId(nyttNavn)), { navn: nyttNavn, rolle: nyRolle, tetthet: nyTetthet });
      ingredientRoles[nyttNavn] = { rolle: nyRolle, tetthet: nyTetthet };
      endret++;
    }
  }

  setStatus(endret === 0 ? 'Ingen endringer.' : `Lagret. ${endret} endring${endret===1?'':'er'}.`);
  setTimeout(() => { statusMsg = ''; render(); }, 2500);
}

function saveFormState() {
  const n=document.getElementById('e-name');
  const c=document.getElementById('e-cat');
  const s=document.getElementById('e-steps');
  const nt=document.getElementById('e-notes');
  if(n)editData.name=n.value;
  if(c)editData.category=c.value;
  if(s)editData.versions[0].steps=s.value;
  if(nt)editData.versions[0].notes=nt.value;

  const checkedBakeries = [];
  bakeries.forEach(b => {
    const cb = document.getElementById('bk-' + b.id);
    if (cb && cb.checked) checkedBakeries.push(b.id);
  });
  editData.bakeries = checkedBakeries;

  const container = document.getElementById('ing-container');
  if (container) {
    const rows = container.querySelectorAll('.ing-row');
    const merknader = container.querySelectorAll('.ing-merknad-input');
    const newList = [];
    rows.forEach((row, i) => {
      const mengdeStr = row.querySelector('.ing-mengde').value.trim();
      const enhet = row.querySelector('.ing-enhet').value.trim();
      const navn = row.querySelector('.ing-navn').value.trim();
      const rolle = row.querySelector('.ing-rolle').value;
      const merknad = merknader[i] ? merknader[i].value.trim() : '';
      let mengde = null;
      if (mengdeStr !== '') {
        const num = parseFloat(mengdeStr.replace(',', '.'));
        mengde = isNaN(num) ? mengdeStr : num;
      }
      const finalRolle = rolle || lookupRole(navn);
      newList.push({ mengde, enhet, navn, merknad, rolle: finalRolle });
    });
    editData.versions[0].ingredientsList = newList;
  }
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const maxDim=1600;
      let w=img.width, h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
        else{w=Math.round(w*maxDim/h);h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.85);
      res(dataUrl.split(',')[1]);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}
async function scanRecipe(file) {
  if(!file) return;
  if(!anthropicKey){setStatus('Legg inn Claude API-nøkkel i innstillinger først.');return;}
  saveFormState();setStatus('Leser oppskrift fra bilde...');
  const b64=await toBase64(file);

  const promptText = `Dette er et bilde av en oppskrift. Returner KUN gyldig JSON i nøyaktig dette formatet:

{
  "name": "Navn på oppskriften",
  "ingredientsList": [
    { "mengde": 500, "enhet": "g", "navn": "hvetemel", "merknad": "" },
    { "mengde": null, "enhet": "", "navn": "salt", "merknad": "etter smak" }
  ],
  "steps": "Hele fremgangsmåten som tekst",
  "notes": "Eventuelle ekstra notater fra oppskriften"
}

Regler for ingrediensene:
- Hver ingrediens skal være ett objekt med fire felt: mengde (tall eller null), enhet (string), navn (string), merknad (string).
- Bruk null for mengde hvis oppskriften ikke spesifiserer en mengde (f.eks. "salt etter smak").
- Bruk tom streng "" for enhet, navn eller merknad hvis ikke aktuelt.
- Vanlige enheter: g, kg, ml, dl, l, ts, ss, stk, pakke, knivsodd.
- Hvis det står beskrivelser som "romtemperert", "finhakket", "knust" osv., legg dem i merknad.
- Hvis mengden mangler men det står en kommentar (f.eks. "etter smak", "litt"), legg kommentaren i merknad og sett mengde=null.

Svar KUN med JSON, ingen annen tekst.`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:2048,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:promptText}
        ]}]
      })
    });
    const data=await res.json();
    const rawText = data.content?.[0]?.text || '{}';
    const cleaned = rawText.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(cleaned);

    if (parsed.name) {
      editData.name = parsed.name;
    }
    if (Array.isArray(parsed.ingredientsList)) {
      editData.versions[0].ingredientsList = parsed.ingredientsList.map(ing => {
        const navn = ing.navn || '';
        return {
          mengde: (ing.mengde === null || ing.mengde === undefined) ? null : ing.mengde,
          enhet: ing.enhet || '',
          navn,
          merknad: ing.merknad || '',
          rolle: lookupRole(navn)
        };
      });
    }
    if (parsed.steps) {
      editData.versions[0].steps = parsed.steps;
    }
    if (parsed.notes) {
      editData.versions[0].notes = parsed.notes;
    }
    setStatus('Oppskrift lest! Sjekk og juster feltene.');
    render();
  } catch(e) {
    console.error('Scan-feil:', e);
    setStatus('Kunne ikke lese oppskriften. Prøv igjen.');
  }
}

async function createNewUser() {
  const emailEl = document.getElementById('new-user-email');
  const passEl = document.getElementById('new-user-pass');
  const email = emailEl.value.trim();
  const pass = passEl.value;

  validationErrors.userEmail = false;
  validationErrors.userPass = false;
  const missing = [];
  if (!email) { missing.push('e-post'); validationErrors.userEmail = true; }
  if (!pass) { missing.push('passord'); validationErrors.userPass = true; }

  if (missing.length > 0) {
    setStatus(`Fyll inn ${missing.join(' og ')}.`);
    render();
    return;
  }
  if (pass.length < 6) {
    validationErrors.userPass = true;
    setStatus('Passordet må være minst 6 tegn.');
    render();
    return;
  }

  setStatus('Oppretter bruker...');
  try {
    const createUser = httpsCallable(functions, 'createUser');
    const result = await createUser({ email, password: pass });
    setStatus(`Bruker opprettet: ${result.data.email}`);
    validationErrors = {};
    setTimeout(() => { statusMsg = ''; render(); }, 3000);
  } catch (err) {
    setStatus('Feil: ' + (err.message || 'Kunne ikke opprette bruker.'));
  }
}
