<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakebok</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D9E75">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bakebok">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 600px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 600; }
  h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0 1.5rem; }
  .card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; border: 0.5px solid #e0e0d8; }
  .card-clickable { cursor: pointer; transition: box-shadow 0.15s; }
  .card-clickable:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn { border: 0.5px solid #ccc; border-radius: 8px; padding: 8px 16px; background: transparent; color: #1a1a1a; cursor: pointer; font-size: 14px; }
  .btn:hover { background: #f0f0e8; }
  .btn-primary { border: none; border-radius: 8px; padding: 10px 20px; background: #1D9E75; color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-primary:hover { background: #178a63; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-danger { border: 0.5px solid #c0392b; border-radius: 8px; padding: 8px 16px; background: transparent; color: #c0392b; cursor: pointer; font-size: 14px; }
  .btn-google { border: 0.5px solid #ccc; border-radius: 8px; padding: 10px 20px; background: #fff; color: #1a1a1a; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  input, textarea, select { width: 100%; border-radius: 8px; border: 0.5px solid #ccc; padding: 8px 12px; font-size: 14px; font-family: inherit; background: #fff; color: #1a1a1a; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #1D9E75; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  .status { font-size: 13px; color: #666; margin: 8px 0; }
  .muted { font-size: 12px; color: #888; }
  .gap { display: flex; gap: 8px; flex-wrap: wrap; }
  pre { white-space: pre-wrap; font-family: inherit; font-size: 14px; line-height: 1.7; }
  img.recipe-img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
  .info-box { background: #f0f0e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; font-size: 13px; color: #555; }
  .hero { width: 100%; height: 180px; border-radius: 16px; overflow: hidden; margin-bottom: 1.25rem; cursor: pointer; }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .hero-placeholder { width: 100%; height: 180px; border-radius: 16px; background: linear-gradient(135deg, #e8e4d8, #d4c9a8); margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: center; font-size: 48px; cursor: pointer; }
  .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .cat-btn { border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 14px 12px; background: #fff; cursor: pointer; text-align: left; transition: all 0.15s; width: 100%; }
  .cat-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #1D9E75; }
  .cat-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .cat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .cat-name { font-size: 13px; font-weight: 500; line-height: 1.3; display: block; }
  .cat-count { font-size: 11px; opacity: 0.6; margin-top: 2px; display: block; }
  .cat-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid #e0e0d8; }
  .cat-row:last-child { border-bottom: none; }
  .login-wrap { max-width: 400px; margin: 4rem auto; padding: 0 1rem; width: 100%; }
  #root { width: 100%; }
  .ing-row { display: grid; grid-template-columns: 70px 70px 1fr 90px 50px 30px; gap: 6px; margin-bottom: 6px; align-items: start; }
  .ing-row input, .ing-row select { padding: 6px 8px; font-size: 13px; }
  .ing-row .ing-pct { font-size: 12px; color: #666; padding: 6px 4px; text-align: right; align-self: center; }
  .ing-row .ing-remove { border: none; background: transparent; color: #c0392b; cursor: pointer; font-size: 18px; padding: 6px 0; line-height: 1; }
  .ing-merknad { grid-column: 1 / -1; margin-bottom: 10px; }
  .ing-merknad input { padding: 5px 8px; font-size: 12px; color: #666; font-style: italic; }
  .ing-list-item { padding: 6px 0; font-size: 14px; line-height: 1.5; border-bottom: 0.5px solid #f0f0e8; display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .ing-list-item:last-child { border-bottom: none; }
  .ing-list-item .ing-merknad-text { color: #888; font-size: 12px; font-style: italic; margin-left: 6px; }
  .ing-list-item .ing-pct-text { color: #888; font-size: 12px; flex-shrink: 0; min-width: 40px; text-align: right; }
  .role-row { display: grid; grid-template-columns: 1fr 130px 30px; gap: 6px; margin-bottom: 6px; align-items: center; }
  .role-row input, .role-row select { padding: 6px 8px; font-size: 13px; }
  .role-row .role-remove { border: none; background: transparent; color: #c0392b; cursor: pointer; font-size: 18px; padding: 6px 0; line-height: 1; }
  .role-list-header { display: grid; grid-template-columns: 1fr 130px 30px; gap: 6px; font-size: 12px; color: #666; padding: 4px 0; border-bottom: 0.5px solid #e0e0d8; margin-bottom: 8px; }
  .role-search { margin-bottom: 12px; }
  .role-list { max-height: 400px; overflow-y: auto; padding-right: 4px; }
  .input-error { border-color: #c0392b !important; background: #fef5f4; }
  .validation-msg { color: #c0392b; font-size: 13px; margin: 8px 0; padding: 8px 12px; background: #fef5f4; border-radius: 8px; }
 .bakepct-summary { font-size: 13px; color: #555; padding: 8px 12px; background: #f0f0e8; border-radius: 8px; margin-bottom: 12px; }
  .bakepct-summary .pct-label { color: #888; }
  .bakepct-summary .pct-val { font-weight: 600; color: #1a1a1a; margin-right: 12px; }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .app { padding: 0; }
    .card { border: none; padding: 0; margin-bottom: 1rem; }
    pre { font-size: 12px; }
    img.recipe-img { max-height: 180px; width: auto; object-fit: cover; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyC8cmkZQXfPBFPeFy4ShYqOdCHRqKmkIng",
  authDomain: "bakebok.firebaseapp.com",
  projectId: "bakebok",
  storageBucket: "bakebok.firebasestorage.app",
  messagingSenderId: "518882951454",
  appId: "1:518882951454:web:ce11e02c5a223f24aa890f",
  measurementId: "G-QF76VZH8MC"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const functions = getFunctions(app, 'europe-west1');
const googleProvider = new GoogleAuthProvider();

const DEFAULT_CATEGORIES = [
  { id: 'gjærbrød',  name: 'Brød på gjær',    icon: '' },
  { id: 'surdeig',   name: 'Brød på surdeig',  icon: '' },
  { id: 'søtbakst',  name: 'Søtbakst på gjær', icon: '' },
  { id: 'kjeks',     name: 'Kjeks og scones',   icon: '' },
  { id: 'kaker',     name: 'Kaker',             icon: '' },
  { id: 'andre',     name: 'Andre bakverk',     icon: '' },
];

// Kategorier som skal vise bakeprosent
const BAKE_PCT_CATEGORIES = ['gjærbrød', 'surdeig', 'søtbakst'];

const ROLE_OPTIONS = [
  { id: '',             label: '— ingen —' },
  { id: 'mel_siktet',   label: 'Mel siktet' },
  { id: 'mel_sammalt',  label: 'Mel sammalt' },
  { id: 'væske',        label: 'Væske' },
  { id: 'egg',          label: 'Egg' },
  { id: 'salt',         label: 'Salt' },
  { id: 'søtning',      label: 'Søtning' },
  { id: 'fett',         label: 'Fett' },
  { id: 'gjær',         label: 'Gjær' },
  { id: 'forfermenter', label: 'Forfermenter' },
  { id: 'frø',          label: 'Frø' },
  { id: 'nøtter',       label: 'Nøtter' },
  { id: 'krydder',      label: 'Krydder' },
  { id: 'annet',        label: 'Annet' },
];

function allCategories() { return [...DEFAULT_CATEGORIES, ...customCategories]; }
function getCatName(id) { return allCategories().find(c=>c.id===id)?.name || id; }
function fmt(iso) { return new Date(iso).toLocaleDateString('nb-NO',{day:'2-digit',month:'short',year:'numeric'}); }

function formatIngredient(ing) {
  const parts = [];
  if (ing.mengde !== null && ing.mengde !== undefined && ing.mengde !== '') parts.push(ing.mengde);
  if (ing.enhet) parts.push(ing.enhet);
  if (ing.navn) parts.push(ing.navn);
  return parts.join(' ');
}

function lookupRole(navn) {
  if (!navn) return '';
  const key = navn.trim().toLowerCase();
  if (ingredientRoles[key]) return ingredientRoles[key];
  for (const [name, role] of Object.entries(ingredientRoles)) {
    if (key.includes(name) || name.includes(key)) return role;
  }
  return '';
}

// =====================================================================
// BAKEPROSENT-BEREGNING
// =====================================================================

function asNumber(x) {
  if (x === null || x === undefined || x === '') return 0;
  if (typeof x === 'number') return x;
  const n = parseFloat(String(x).replace(',', '.'));
  return isNaN(n) ? 0 : n;
}

// Returnerer { melTotal, melSiktet, melSammalt, vaeskeTotal, salt, hydrering, saltPct, grovhet }
function calcBakePcts(ingList) {
  if (!Array.isArray(ingList)) return null;

  let melSiktet = 0;
  let melSammalt = 0;
  let vaeskeTotal = 0;
  let salt = 0;

  // forfermenter deles 50/50 mel/væske som standard
  for (const ing of ingList) {
    const mengde = asNumber(ing.mengde);
    if (mengde === 0) continue;

    switch (ing.rolle) {
      case 'mel_siktet':   melSiktet += mengde; break;
      case 'mel_sammalt':  melSammalt += mengde; break;
      case 'væske':        vaeskeTotal += mengde; break;
      case 'egg':          vaeskeTotal += mengde; break;
      case 'salt':         salt += mengde; break;
      case 'forfermenter':
        melSiktet += mengde / 2;
        vaeskeTotal += mengde / 2;
        break;
    }
  }

  const melTotal = melSiktet + melSammalt;
  if (melTotal === 0) return null;

  const hydrering = (vaeskeTotal / melTotal) * 100;
  const saltPct = (salt / melTotal) * 100;
  const grovhet = (melSammalt / melTotal) * 100;

  return { melTotal, melSiktet, melSammalt, vaeskeTotal, salt, hydrering, saltPct, grovhet };
}

// Beregn prosent for én ingrediens (av mel total)
function ingredientPct(ing, melTotal) {
  if (melTotal === 0) return null;
  const mengde = asNumber(ing.mengde);
  if (mengde === 0) return null;
  return (mengde / melTotal) * 100;
}

// Skal denne kategorien vise bakeprosent?
function shouldShowBakePct(categoryId) {
  return BAKE_PCT_CATEGORIES.includes(categoryId);
}

function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return Math.round(n) + '%';
}

function fmtPct1(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return n.toFixed(1) + '%';
}

function bakePctSummaryHtml(pcts) {
  if (!pcts) return '';
  return `<div class="bakepct-summary">
    <span class="pct-label">Hydrering </span><span class="pct-val">${fmtPct(pcts.hydrering)}</span>
    <span class="pct-label">Salt </span><span class="pct-val">${fmtPct1(pcts.saltPct)}</span>
    <span class="pct-label">Grovhet </span><span class="pct-val">${fmtPct(pcts.grovhet)}</span>
  </div>`;
}

// =====================================================================
// STATE
// =====================================================================

let currentUser = null;
let recipes = [];
let customCategories = [];
let ingredientRoles = {};
let coverImageUrl = null;
let anthropicKey = null;
let view = 'login';
let selected = null;
let selectedVersion = 0;
let editData = null;
let loading = false;
let statusMsg = '';
let activeCategory = null;
let loginMode = 'choose';
let roleSearch = '';
let validationErrors = {};
 
function render() {
  const root = document.getElementById('root');
  if (view === 'login') { root.innerHTML = loginView(); bindLogin(); return; }
  root.innerHTML = `<div class="app">${
    view === 'settings' ? settingsView() :
    view === 'roles' ? rolesView() :
    view === 'edit' ? editView() :
    view === 'recipe' ? recipeView() :
    homeView()
  }</div>`;
  if (view === 'edit') bindEdit();
  if (view === 'settings') bindSettings();
  if (view === 'roles') bindRoles();
}

function loginView() {
  return `
    <div class="login-wrap">
      <div style="text-align:center;margin-bottom:2rem">
        <div style="font-size:48px;margin-bottom:8px">🍞</div>
        <h1>Bakebok</h1>
        <p class="muted" style="margin-top:4px">Din digitale oppskriftsbok</p>
      </div>
      <div class="card">
        <button class="btn-google" style="width:100%;justify-content:center;margin-bottom:8px" onclick="doGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
          Logg inn med Google
        </button>
        <div style="text-align:center;margin:12px 0;font-size:12px;color:#888">eller logg inn med e-post</div>
        <label>E-postadresse</label>
        <input type="email" id="l-email" placeholder="din@epost.no">
        <label>Passord</label>
        <input type="password" id="l-pass" placeholder="Passord">
        ${statusMsg?`<p class="status" style="color:#c0392b">${statusMsg}</p>`:''}
        <button class="btn-primary" style="width:100%;margin-top:12px" onclick="doEmailLogin()">Logg inn</button>
      </div>
    </div>`;
}

function homeView() {
  const hero = coverImageUrl
    ? `<div class="hero" onclick="goHome()"><img src="${coverImageUrl}" alt="Forsidebilde"></div>`
    : `<div class="hero-placeholder" onclick="goHome()">🍞</div>`;

  const catGrid = allCategories().map(c => {
    const count = recipes.filter(r=>r.category===c.id).length;
    return `<button class="cat-btn ${activeCategory===c.id?'active':''}" onclick="selectCat('${c.id}')">
      <span class="cat-name">${c.name}</span>
      <span class="cat-count">${count} oppskrift${count!==1?'er':''}</span>
    </button>`;
  }).join('');

  const filtered = activeCategory ? recipes.filter(r=>r.category===activeCategory) : [];
  const catLabel = activeCategory ? getCatName(activeCategory) : '';

  const recipeList = activeCategory ? `
    <button class="btn" style="margin-bottom:12px" onclick="selectCat(null)">← Alle kategorier</button>
    <h2 style="margin-bottom:12px">${catLabel}</h2>
    ${filtered.length===0?`<div class="info-box">Ingen oppskrifter i denne kategorien ennå.</div>`:''}
    ${filtered.map(r=>{
      const thumb=r.versions.find(v=>v.images&&v.images.length>0)?.images[0]||null;
      return `<div class="card card-clickable" onclick="openRecipe('${r.id}')" style="display:flex;align-items:center;gap:12px">
        <div style="flex:1;min-width:0">
          <p style="font-weight:500">${r.name}</p>
          <p class="muted">Sist oppdatert ${fmt(r.versions[0].date)}</p>
        </div>
        ${thumb?`<img src="${thumb}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0">`:''}
      </div>`;
    }).join('')}` : '';

  return `${hero}
    <div class="topbar no-print" style="padding-top:0"><h1>Bakebok</h1>
    <div class="gap">
      <button class="btn" onclick="setView('settings')">Innstillinger</button>
      <button class="btn-primary" onclick="startNew()">+ Ny</button>
    </div></div>
    ${loading?`<p class="status">Laster...</p>`:''}
    ${statusMsg?`<p class="status">${statusMsg}</p>`:''}
    ${!activeCategory?`<div class="categories">${catGrid}</div>`:recipeList}`;
}

function settingsView() {

          <span style="font-size:14px">${c.name}</span>
          <button class="btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteCustomCat('${c.id}')">Slett</button>

  return `
    <div class="topbar no-print"><button class="btn" onclick="setView('home')">← Tilbake</button></div>
    <h2>Innstillinger</h2>
    <div class="card">
      <p style="font-size:13px;margin-bottom:4px">Innlogget som: <strong>${currentUser?.email||''}</strong></p>
      <button class="btn" style="margin-top:8px" onclick="doSignOut()">Logg ut</button>
    </div>
    <div class="card">
      <p style="font-weight:500;margin-bottom:8px">Forsidebilde</p>

    <div class="card">

      <input type="email" id="new-user-email" placeholder="navn@epost.no">

function rolesView() {
  const search = (roleSearch || '').toLowerCase();
  const entries = Object.entries(ingredientRoles)
    .sort((a, b) => a[0].localeCompare(b[0], 'nb'))
    .filter(([navn]) => !search || navn.includes(search));

  const roleOptionsHtml = (selected) =>
    ROLE_OPTIONS.map(r => `<option value="${r.id}" ${r.id===selected?'selected':''}>${r.label}</option>`).join('');

  const roleOpts = ROLE_OPTIONS.map(r => `<option value="${r.id}" ${r.id===(ing.rolle||'')?'selected':''}>${r.label}</option>`).join('');

  }
  return `
    <div class="ing-row" data-idx="${idx}">
      <input type="text" class="ing-mengde" placeholder="Mengde" value="${ing.mengde !== null && ing.mengde !== undefined ? ing.mengde : ''}">

      <select class="ing-rolle">${roleOpts}</select>
      <span class="ing-pct">${pctStr}</span>
      <button type="button" class="ing-remove" onclick="removeIngredient(${idx})" title="Fjern">×</button>
    </div>
    <div class="ing-merknad">
      <input type="text" class="ing-merknad-input" placeholder="Merknad (f.eks. romtemperert, etter smak)" value="${ing.merknad || ''}">

}

      const cls = e.target.classList;
      if (cls && (cls.contains('ing-mengde') || cls.contains('ing-enhet') || cls.contains('ing-navn'))) {
        // Re-render ved endring av mengde/navn (for prosent + auto-rolle)
        if (cls.contains('ing-mengde')) {

        saveFormState();
        render();
      }

    container.addEventListener('blur', (e) => {
      if (e.target.classList && e.target.classList.contains('ing-navn')) {
        const row = e.target.closest('.ing-row');

        const roleSelect = row.querySelector('.ing-rolle');
        if (roleSelect && !roleSelect.value) {
          const role = lookupRole(e.target.value);
          if (role) {
            saveFormState();
            render();
          }
        }
      }
    }, true);
  }

  // Endring av kategori re-rendrer for å vise/skjule bakeprosent

    catSelect.addEventListener('change', () => {
      saveFormState();
      render();

// Fjern feilmarkering når brukeren begynner å fylle ut

      nameEl.classList.remove('input-error');

    });
  }
  if (catSelect) {
    catSelect.addEventListener('change', () => {
      catSelect.classList.remove('input-error');
      validationErrors.category = false;
    });
  }

// Ingrediensliste-admin
function ingredientRoleId(navn) {
  return navn.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9æøå_]/g, '');
}
async function addIngredientRole() {
  const navn = document.getElementById('new-role-navn').value.trim();
  const rolle = document.getElementById('new-role-rolle').value;
  if (!navn) { setStatus('Skriv inn et ingrediensnavn.'); return; }
  const navnLow = navn.toLowerCase();
  const id = ingredientRoleId(navn);
  await setDoc(doc(db, 'ingredient_roles', id), { navn: navnLow, rolle });
  ingredientRoles[navnLow] = rolle;
  setStatus(`Lagt til "${navn}" som ${rolle || 'ingen rolle'}.`);
  setTimeout(() => { statusMsg = ''; render(); }, 2000);
  render();
}
async function deleteIngredientRole(navn) {
  if (!confirm(`Slette "${navn}" fra lista?`)) return;
  const id = ingredientRoleId(navn);
  await deleteDoc(doc(db, 'ingredient_roles', id));
  delete ingredientRoles[navn];
  render();
}
async function saveAllRoleEdits() {
  const rows = document.querySelectorAll('.role-row[data-navn]');
  let endret = 0, slettet = 0, lagtTil = 0;
  setStatus('Lagrer endringer...');

  for (const row of rows) {
    const original = row.querySelector('.role-navn').dataset.original;
    const nyttNavn = row.querySelector('.role-navn').value.trim().toLowerCase();
    const nyRolle = row.querySelector('.role-rolle').value;
    const originalRolle = ingredientRoles[original];

    if (!nyttNavn) continue;

    if (nyttNavn !== original) {
      await deleteDoc(doc(db, 'ingredient_roles', ingredientRoleId(original)));
      delete ingredientRoles[original];
      await setDoc(doc(db, 'ingredient_roles', ingredientRoleId(nyttNavn)), { navn: nyttNavn, rolle: nyRolle });
      ingredientRoles[nyttNavn] = nyRolle;
      slettet++; lagtTil++;
    } else if (nyRolle !== originalRolle) {
      await setDoc(doc(db, 'ingredient_roles', ingredientRoleId(nyttNavn)), { navn: nyttNavn, rolle: nyRolle });
      ingredientRoles[nyttNavn] = nyRolle;
      endret++;
    }
  }

  const sum = endret + slettet + lagtTil;
  setStatus(sum === 0 ? 'Ingen endringer.' : `Lagret. ${endret} endret${slettet ? `, ${slettet} omdøpt` : ''}.`);
  setTimeout(() => { statusMsg = ''; render(); }, 2500);
}

function saveFormState() {

  if(n)editData.name=n.value;

  if(s)editData.versions[0].steps=s.value;
  if(nt)editData.versions[0].notes=nt.value;

  const container = document.getElementById('ing-container');
  if (container) {
    const rows = container.querySelectorAll('.ing-row');
    const merknader = container.querySelectorAll('.ing-merknad-input');
    const newList = [];
    rows.forEach((row, i) => {

      const enhet = row.querySelector('.ing-enhet').value.trim();
      const navn = row.querySelector('.ing-navn').value.trim();
      const rolle = row.querySelector('.ing-rolle').value;
      const merknad = merknader[i] ? merknader[i].value.trim() : '';

        const num = parseFloat(mengdeStr.replace(',', '.'));
        mengde = isNaN(num) ? mengdeStr : num;
      }
      const finalRolle = rolle || lookupRole(navn);
      newList.push({ mengde, enhet, navn, merknad, rolle: finalRolle });
    });
    editData.versions[0].ingredientsList = newList;
  }

// Scan
function toBase64(file){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const maxDim=1600;
      let w=img.width, h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
        else{w=Math.round(w*maxDim/h);h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.85);
      res(dataUrl.split(',')[1]);
    };
    img.onerror=rej;
    img.src=URL.createObjectURL(file);
  });
}
async function scanRecipe(file) {
  if(!file) return;
  if(!anthropicKey){setStatus('Legg inn Claude API-nøkkel i innstillinger først.');return;}
  saveFormState();setStatus('Leser oppskrift fra bilde...');
  const b64=await toBase64(file);

  const promptText = `Dette er et bilde av en oppskrift. Returner KUN gyldig JSON i nøyaktig dette formatet:

{
  "name": "Navn på oppskriften",
  "ingredientsList": [
    { "mengde": 500, "enhet": "g", "navn": "hvetemel", "merknad": "" },
    { "mengde": null, "enhet": "", "navn": "salt", "merknad": "etter smak" }
  ],
  "steps": "Hele fremgangsmåten som tekst",
  "notes": "Eventuelle ekstra notater fra oppskriften"
}

Regler for ingrediensene:
- Hver ingrediens skal være ett objekt med fire felt: mengde (tall eller null), enhet (string), navn (string), merknad (string).
- Bruk null for mengde hvis oppskriften ikke spesifiserer en mengde (f.eks. "salt etter smak").
- Bruk tom streng "" for enhet, navn eller merknad hvis ikke aktuelt.
- Vanlige enheter: g, kg, ml, dl, l, ts, ss, stk, pakke, knivsodd.
- Hvis det står beskrivelser som "romtemperert", "finhakket", "knust" osv., legg dem i merknad.
- Hvis mengden mangler men det står en kommentar (f.eks. "etter smak", "litt"), legg kommentaren i merknad og sett mengde=null.

Svar KUN med JSON, ingen annen tekst.`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:2048,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:promptText}
        ]}]
      })
    });
    const data=await res.json();
    const rawText = data.content?.[0]?.text || '{}';
    const cleaned = rawText.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(cleaned);

    if (parsed.name) {
      editData.name = parsed.name;
    }
    if (Array.isArray(parsed.ingredientsList)) {
      editData.versions[0].ingredientsList = parsed.ingredientsList.map(ing => {
        const navn = ing.navn || '';
        return {
          mengde: (ing.mengde === null || ing.mengde === undefined) ? null : ing.mengde,
          enhet: ing.enhet || '',
          navn,
          merknad: ing.merknad || '',
          rolle: lookupRole(navn)
        };
      });
    }
    if (parsed.steps) {
      editData.versions[0].steps = parsed.steps;
    }
    if (parsed.notes) {
      editData.versions[0].notes = parsed.notes;
    }
    setStatus('Oppskrift lest! Sjekk og juster feltene.');
    render();
  } catch(e) {
    console.error('Scan-feil:', e);
    setStatus('Kunne ikke lese oppskriften. Prøv igjen.');
  }
}

// Opprett ny bruker
async function createNewUser() {
  const emailEl = document.getElementById('new-user-email');
  const passEl = document.getElementById('new-user-pass');
  const email = emailEl.value.trim();
  const pass = passEl.value;

  // Valider
  emailEl.classList.remove('input-error');
  passEl.classList.remove('input-error');
  const missing = [];
  if (!email) { missing.push('e-post'); emailEl.classList.add('input-error'); }
  if (!pass) { missing.push('passord'); passEl.classList.add('input-error'); }

  if (missing.length > 0) {
    setStatus(`Fyll inn ${missing.join(' og ')}.`);
    return;
  }
  if (pass.length < 6) {
    passEl.classList.add('input-error');
    setStatus('Passordet må være minst 6 tegn.');
    return;
  }

    setStatus('Oppretter bruker...');
  try {
    const createUser = httpsCallable(functions, 'createUser');
    const result = await createUser({ email, password: pass });
    setStatus(`Bruker opprettet: ${result.data.email}`);
    setTimeout(() => { statusMsg = ''; render(); }, 3000);
  } catch (err) {
    setStatus('Feil: ' + (err.message || 'Kunne ikke opprette bruker.'));
  }
}

// Init
onAuthStateChanged(auth, async user => {
  if (user) {
    const allowed = await isEmailAllowed(user.email);
    if (!allowed) {
      await signOut(auth);
      currentUser = null;
      view = 'login';
      statusMsg = 'Denne kontoen har ikke tilgang. Kontakt eier.';
      recipes = [];
      customCategories = [];
      render();
      return;
    }
    currentUser = user;
    loading = true; view = 'home'; render();
    await Promise.all([loadRecipes(), loadCustomCategories(), loadAppSettings(), loadIngredientRoles()]);
    loading = false; render();
  } else {
    currentUser = null;
    view = 'login'; loginMode = 'choose';
    recipes = []; customCategories = [];
    render();
  }
});
